# ~/.tmux.conf — symlinked from the dotfiles repo.

# Use Ctrl-a as the prefix (easier than Ctrl-b).
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Sensible defaults.
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -sg escape-time 10
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Reload config with prefix + r.
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# Intuitive split bindings (keep current path).
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status bar.
set -g status-interval 5
set -g status-style "bg=default fg=cyan"
set -g status-right "#[fg=yellow]%Y-%m-%d #[fg=green]%H:%M "
